# Redis configuration for HearthLedger
# Only internal to the Docker network — no external exposure.

# Persistence: AOF for durability (ARQ job data survives restarts)
appendonly yes
appendfsync everysec

# Memory management
maxmemory-policy noeviction

# Disable protected-mode (safe because the port is never exposed to the host)
protected-mode no

# Disable bind so the container listens on all interfaces within the Docker network
# (the compose network is the security boundary, not bind)
